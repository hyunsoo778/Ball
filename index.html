<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- PWA 설정 -->
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meet Ball">
  <meta name="application-name" content="Meet Ball">
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎳 Meet Ball</title>

  <!-- 외부 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- ✅ 스타일 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ✅ 헤더 & 네비게이션 -->
  <!-- header 코드 (index__1_.html 의 <header>...</header> 부분) -->

  <main style="position:relative;z-index:1;padding:32px 24px;max-width:1400px;margin:0 auto;">
    <!-- ✅ 각 섹션 (sections/ 폴더 참고) -->
    <!-- sections/notice.html     → #notice      공지사항 -->
    <!-- sections/upload.html     → #upload       점수 업로드 -->
    <!-- sections/ranking.html    → #ranking      순위 -->
    <!-- sections/rounds.html     → #rounds       라운드 기록 -->
    <!-- sections/players.html    → #players      선수 관리 -->
    <!-- sections/dues.html       → #dues         회비/벌금/상금 -->
    <!-- sections/vote.html       → #vote         투표 -->
    <!-- sections/teambuilder.html→ #teambuilder  팀 편성 -->
    <!-- sections/members.html    → #members      회원 목록 -->
  </main>

  <!-- ✅ 모달 (modals.html) -->
  <!-- 관리자 로그인 / 로그아웃 모달 -->

  <!-- ✅ 자바스크립트 (로드 순서 중요!) -->
  <script src="js/data.js"></script>        <!-- 데이터 / 저장소 / 초기화 -->
  <script src="js/calc.js"></script>        <!-- 계산 헬퍼 -->
  <script src="js/ui-core.js"></script>     <!-- UI 공통 (섹션전환/탭/토스트) -->
  <script src="js/ocr.js"></script>         <!-- OCR / AI 이미지 인식 -->
  <script src="js/score.js"></script>       <!-- 점수 에디터 -->
  <script src="js/members.js"></script>     <!-- 회원관리 / 순위 / 라운드 -->
  <script src="js/fines.js"></script>       <!-- 벌금 / 상금 렌더링 -->
  <script src="js/notice.js"></script>      <!-- 공지사항 / 회비 관리 -->
  <script src="js/sponsor.js"></script>     <!-- 찬조 / 엑셀 / 데이터 -->
  <script src="js/tourney.js"></script>     <!-- 토너먼트 / 방개 / 투표 -->
  <script src="js/teambuilder.js"></script> <!-- 팀 편성 -->

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW 등록됨'))
          .catch(e => console.log('SW 오류:', e));
      });
    }
  </script>
</body>
</html>
