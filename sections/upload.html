<!-- ═══ section: #upload ═══ -->

<section id="upload" class="section">
  <div class="page-title">SCORE INPUT</div>
  <div class="page-sub">점수표 이미지를 업로드하면 AI가 자동으로 점수를 인식합니다</div>
  <div id="uploadLocked" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: var(--text3);">
    <div style="font-size:52px;margin-bottom:16px;">🔒</div>
    <div style="font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px;">관리자 전용 기능입니다</div>
    <div style="font-size:13px;margin-bottom:24px;">오른쪽 상단 관리자 버튼을 눌러 로그인하세요</div>
    <button class="btn btn-secondary" onclick="toggleAdmin()">🔑 관리자 로그인</button>
<span id="fbStatus" style="font-size: 11px; padding: 4px 10px; border-radius: 8px; background: rgb(26, 34, 54); border: 1px solid rgb(30, 45, 69); color: rgb(34, 197, 94); margin-left: 8px;">🟢 연결됨</span>
  </div>
  <div id="uploadContent" style="display: block;">

  <div class="date-row">
    <div class="input-group">
      <label>날짜</label>
      <input type="date" id="matchDate">
    </div>
    <div class="input-group">
      <label>회차</label>
      <select id="matchRound">
        <option>1월 1회차</option>
        <option>1월 2회차</option>
        <option>2월 1회차</option>
        <option>2월 2회차</option>
        <option>3월 1회차</option>
        <option>3월 2회차</option>
        <option>4월 1회차</option>
        <option>4월 2회차</option>
        <option>5월 1회차</option>
        <option>5월 2회차</option>
        <option>6월 1회차</option>
        <option>6월 2회차</option>
        <option>7월 1회차</option>
        <option>7월 2회차</option>
        <option>8월 1회차</option>
        <option>8월 2회차</option>
        <option>9월 1회차</option>
        <option>9월 2회차</option>
        <option>10월 1회차</option>
        <option>10월 2회차</option>
        <option>11월 1회차</option>
        <option>11월 2회차</option>
        <option>12월 1회차</option>
        <option>12월 2회차</option>
      </select>
    </div>
  </div>

  <!-- Claude API 키 설정 -->
  <div id="apiKeySection" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:18px;">🤖</span>
      <div style="flex:1;min-width:200px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px;">Claude AI 점수 인식 <span id="apiKeyStatus" style="font-size:11px;font-weight:400;color:var(--text3);">미설정</span></div>
        <div style="font-size:11px;color:var(--text3);">API 키 설정 시 AI가 점수표를 정확하게 인식합니다 · <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">키 발급</a></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..."
          style="width:220px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;outline:none;font-family:inherit;"
          onkeydown="if(event.key==='Enter')saveApiKey()">
        <button onclick="saveApiKey()" class="btn btn-primary" style="font-size:12px;padding:7px 14px;">저장</button>
        <button onclick="clearApiKey()" class="btn btn-secondary" style="font-size:12px;padding:7px 10px;">🗑️</button>
      </div>
    </div>
  </div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*">
    <span class="upload-icon">📸</span>
    <div class="upload-title">점수표 이미지를 업로드하세요</div>
    <div class="upload-sub">클릭하거나 이미지를 여기로 드래그하세요 · JPG, PNG 지원</div>
  </div>

  <img id="previewImg" alt="미리보기">

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>
      <div style="font-weight:600;font-size:14px;">점수표를 분석하는 중...</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px;"><span id="ocrProgressMsg">잠시만 기다려주세요</span></div>
    </div>
  </div>

  <div class="score-editor" id="scoreEditor">
    <div class="editor-header">
      <div class="editor-title">인식된 점수 확인 및 수정</div>
      <div class="editor-badge">✨ AI 자동인식</div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="clearEditor()">✕ 취소</button>
        <button class="btn btn-primary" onclick="saveScores()">💾 저장하기</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>선수명</th>
          <th>1G</th>
          <th>2G</th>
          <th>3G</th>
          <th>총점</th>
          <th>에버리지</th>
          <th>기준에버</th>
          <th>벌금</th>
        </tr>
      </thead>
      <tbody id="scoreTableBody"></tbody>
    </table>
  </div>

  <div class="toolbar" id="manualAddBar" style="margin-top:16px;">
    <button class="btn btn-secondary" onclick="addManualRow()">+ 수동으로 점수 추가</button>
  </div>
  </div>
</section>

<!-- ② 순위 -->
